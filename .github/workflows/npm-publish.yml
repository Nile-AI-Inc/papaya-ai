name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish @papaya-ai/tracing to npm with provenance"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.8.1"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Dry-run package
        run: npm pack --dry-run

  publish:
    name: Publish package
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.publish_npm
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.8.1"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Publish with provenance
        run: npm publish --access public --provenance
