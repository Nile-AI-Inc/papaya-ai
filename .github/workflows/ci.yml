name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "20.x"
          - "22.x"
          - "25.8.1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Dry-run package
        if: matrix.node == '25.8.1'
        run: npm pack --dry-run

  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.9"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Test Python SDK
        run: python -m unittest discover packages/papaya-ai-python/tests

      - name: Build Python package
        if: matrix.python == '3.13'
        run: python -m build packages/papaya-ai-python

      - name: Check Python package metadata
        if: matrix.python == '3.13'
        run: python -m twine check packages/papaya-ai-python/dist/*

      - name: Install Python package artifact
        if: matrix.python == '3.13'
        run: python -m pip install "$(find packages/papaya-ai-python/dist -name 'papaya_ai-*.whl' -print -quit)[langchain]"

      - name: Smoke Python LangChain import
        if: matrix.python == '3.13'
        run: python -c "from papaya_ai import Papaya; from papaya_ai.integrations.langchain import PapayaCallbackHandler; print(Papaya.__name__, PapayaCallbackHandler.__name__)"
